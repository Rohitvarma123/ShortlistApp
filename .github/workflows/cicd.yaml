name: Full Angular + Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    steps:

    #################################################
    # SOURCE CODE
    #################################################
    - name: Checkout Source Code
      uses: actions/checkout@v4

    #################################################
    # NODE SETUP
    #################################################
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    #################################################
    # FRONTEND BUILD
    #################################################
    - name: Install Frontend Dependencies
      run: npm install

    - name: Build Angular Application
      run: npm run build -- --configuration=production

    #################################################
    # SONARQUBE SCAN
    #################################################
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    #################################################
    # TRIVY FS SCAN
    #################################################
    - name: Trivy File System Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    #################################################
    # ARTIFACT TO NEXUS
    #################################################
    - name: Zip Angular Build
      run: zip -r angular-build.zip dist/

    - name: Upload Artifact to Nexus
      run: |
        curl --fail -v \
        -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }} \
        --upload-file angular-build.zip \
        ${{ secrets.NEXUS_REPO_URL }}/angular-build-${{ github.run_number }}.zip

    #################################################
    # AWS CONFIG
    #################################################
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-2

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    #################################################
    # FRONTEND DOCKER BUILD + PUSH
    #################################################
    - name: Build Frontend Docker Image
      run: |
        docker build -t angular-app:${{ github.run_number }} .

    - name: Scan Frontend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'angular-app:${{ github.run_number }}'
        format: table
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Tag Frontend Image
      run: |
        docker tag angular-app:${{ github.run_number }} \
        ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }}

        docker tag angular-app:${{ github.run_number }} \
        ${{ secrets.ECR_REPOSITORY }}:latest

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }}
        docker push ${{ secrets.ECR_REPOSITORY }}:latest

    #################################################
    # BACKEND DOCKER BUILD + PUSH
    #################################################
    - name: Build Backend Docker Image
      run: |
        docker build -t backend-app:${{ github.run_number }} ./backend

    - name: Scan Backend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'backend-app:${{ github.run_number }}'
        format: table
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Tag Backend Image
      run: |
        docker tag backend-app:${{ github.run_number }} \
        ${{ secrets.BACKEND_ECR_REPOSITORY }}:${{ github.run_number }}

        docker tag backend-app:${{ github.run_number }} \
        ${{ secrets.BACKEND_ECR_REPOSITORY }}:latest

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.BACKEND_ECR_REPOSITORY }}:${{ github.run_number }}
        docker push ${{ secrets.BACKEND_ECR_REPOSITORY }}:latest

    #################################################
    # ECS DEPLOYMENT
    #################################################
    - name: Deploy Frontend ECS
      run: |
        aws ecs update-service \
        --cluster angular-cluster \
        --service angular-service \
        --force-new-deployment \
        --region eu-west-2

    - name: Deploy Backend ECS
      run: |
        aws ecs update-service \
        --cluster backend-cluster \
        --service backend-service \
        --force-new-deployment \
        --region eu-west-2

    #################################################
    # EKS DEPLOYMENT (OPTIONAL)
    #################################################
    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
        --region eu-west-2 \
        --name angular-cluster

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|IMAGE_TAG|${{ github.run_number }}|g" k8s/deployment.yaml

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/
