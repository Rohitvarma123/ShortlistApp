name: Angular CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    steps:

    # Checkout Source Code
    - name: Checkout Source Code
      uses: actions/checkout@v4


    # Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22


    # Install Frontend Dependencies
    - name: Install Frontend Dependencies
      run: npm install


    # Build Angular Application
    - name: Build Angular Application
      run: npm run build -- --configuration=production


    # SonarQube Scan
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


    # Trivy File System Scan
    - name: Trivy File System Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'


    # Zip Angular Build Artifact
    - name: Zip Angular Build Artifact
      run: |
        zip -r angular-build.zip dist/


    # Upload Artifact to Nexus
    - name: Upload Artifact to Nexus
      run: |
        curl --fail -v \
        -u ${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }} \
        --upload-file angular-build.zip \
        ${{ secrets.NEXUS_REPO_URL }}/angular-build-${{ github.run_number }}.zip


    # Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    # Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    #################################################
    # FRONTEND DOCKER BUILD
    #################################################

    # Build Frontend Docker Image
    - name: Build Frontend Docker Image
      run: |
        docker build -t angular-app:${{ github.run_number }} .


    # Trivy Frontend Docker Scan
    - name: Trivy Frontend Docker Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'angular-app:${{ github.run_number }}'
        format: table
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'


    # Tag Frontend Docker Image
    - name: Tag Frontend Docker Image
      run: |
        docker tag angular-app:${{ github.run_number }} \
        ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }}

        docker tag angular-app:${{ github.run_number }} \
        ${{ secrets.ECR_REPOSITORY }}:latest


    # Push Frontend Docker Image
    - name: Push Frontend Docker Image
      run: |
        docker push ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }}

        docker push ${{ secrets.ECR_REPOSITORY }}:latest


    #################################################
    # BACKEND DOCKER BUILD
    #################################################

    # Build Backend Docker Image
    - name: Build Backend Docker Image
      run: |
        docker build -t backend-app:${{ github.run_number }} ./backend


    # Trivy Backend Docker Scan
    - name: Trivy Backend Docker Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'backend-app:${{ github.run_number }}'
        format: table
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'


    # Tag Backend Docker Image
    - name: Tag Backend Docker Image
      run: |
        docker tag backend-app:${{ github.run_number }} \
        ${{ secrets.BACKEND_ECR_REPOSITORY }}:${{ github.run_number }}

        docker tag backend-app:${{ github.run_number }} \
        ${{ secrets.BACKEND_ECR_REPOSITORY }}:latest


    # Push Backend Docker Image
    - name: Push Backend Docker Image
      run: |
        docker push ${{ secrets.BACKEND_ECR_REPOSITORY }}:${{ github.run_number }}

        docker push ${{ secrets.BACKEND_ECR_REPOSITORY }}:latest


    #################################################
    # ECS DEPLOYMENT
    #################################################

    # Deploy Frontend ECS
    - name: Deploy Frontend ECS
      run: |
        aws ecs update-service \
        --cluster angular-cluster \
        --service angular-service \
        --force-new-deployment \
        --region eu-west-2


    # Deploy Backend ECS
    - name: Deploy Backend ECS
      run: |
        aws ecs update-service \
        --cluster angular-cluster \
        --service backend-service \
        --force-new-deployment \
        --region eu-west-2


    #################################################
    # EKS DEPLOYMENT
    #################################################

    # Configure kubectl
    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
        --region eu-west-2 \
        --name angular-cluster


    # Replace IMAGE_TAG
    - name: Update Kubernetes Deployment
      run: |
        sed -i "s|IMAGE_TAG|${{ github.run_number }}|g" k8s/deployment.yaml


    # Deploy to EKS
    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/
